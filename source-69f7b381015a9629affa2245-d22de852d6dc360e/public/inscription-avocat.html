<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JurisLinkia — Avocat d'affaires Québec et Ontario</title>
    <meta name="description" content="Trouvez un avocat d'affaires membre du Barreau du Québec ou du Barreau de l'Ontario en 2 minutes." />
  </head>
  <body>

    <!-- 🔥 NETLIFY FORM DETECTION (HIDDEN) -->
    <!-- Ce form caché est OBLIGATOIRE pour que Netlify détecte le form au build. -->
    <!-- NE PAS dupliquer ailleurs dans React. -->
    <!-- Honeypot retiré pour éviter les faux-positifs Akismet. -->
    <form name="inscription-avocat" data-netlify="true" hidden>
      <input type="hidden" name="form-name" value="inscription-avocat" />
      <input type="text" name="firstName" />
      <input type="text" name="lastName" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="province" />
      <input type="text" name="city" />
      <textarea name="facts"></textarea>
      <input type="text" name="submittedAt" />
    </form>
    <!-- 🔥 FIN NETLIFY FORM -->

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
