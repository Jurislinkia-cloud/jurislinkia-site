<!DOCTYPE html>
<html lang="fr">
  <body>
    <!-- Fichier statique pour l'enregistrement du formulaire Netlify Forms / Static file for Netlify Forms registration. -->
    <!-- Ce fichier n'est jamais affiché aux utilisateurs / This file is never displayed to users. -->
    <form name="inscription-avocat" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="locale" />
      <input type="text" name="prenom" />
      <input type="text" name="nom" />
      <input type="text" name="cabinet" />
      <input type="text" name="ville" />
      <input type="text" name="province" />
      <input type="tel" name="telephone" />
      <input type="email" name="courriel" />
      <input type="text" name="experience" />
      <input type="text" name="barreau" />
      <input type="text" name="domaines" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
